name: CI - Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with Black
        run: |
          black --check --line-length 88 .

      - name: Check imports with isort
        run: |
          isort --check-only .

      - name: Lint with flake8
        run: |
          flake8 --count --select=E9,F63,F7,F82 --show-source --statistics .
          flake8 --count --exit-zero --max-complexity=10 --statistics .

  lint-arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Teensyduino platform
        run: |
          arduino-cli core update-index
          arduino-cli core install teensy:avr

      - name: Compile Teensy firmware
        run: |
          arduino-cli compile --fqbn teensy:avr:teensy41:usb=serial,speed=528,opt=o2std --output-dir=build teensy41.ino

  verify-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for required files
        run: |
          test -f README.md || { echo "README.md missing"; exit 1; }
          test -f LICENSE || { echo "LICENSE missing"; exit 1; }
          test -f requirements.txt || { echo "requirements.txt missing"; exit 1; }
          test -f teensy41.ino || { echo "teensy41.ino missing"; exit 1; }
          test -f pythonfile.py || { echo "pythonfile.py missing"; exit 1; }

      - name: Check markdown files have no trailing whitespace
        run: |
          if git grep -n '[[:space:]]$' -- '*.md'; then
            echo "Trailing whitespace found in markdown files"
            exit 1
          fi

  update-docs:
    runs-on: ubuntu-latest
    needs: [lint-python, lint-arduino]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy documentation (placeholder)
        run: |
          echo "Documentation deployment would happen here"
          echo "Consider using GitHub Pages for docs"
